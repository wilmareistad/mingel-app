name: Sync Fork with Upstream

on:
  schedule:
    # Run every day at 2 AM UTC (adjust time as needed)
    - cron: '0 2 * * *'
  
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Add upstream remote
          git remote add upstream https://github.com/wilmareistad/mingel-app.git || git remote set-url upstream https://github.com/wilmareistad/mingel-app.git
          
          # Fetch upstream
          git fetch upstream main
          
          # Merge upstream into local main
          git merge upstream/main -m "Sync with upstream repository"

      - name: Push changes
        run: |
          git push origin main
